name: Update calendar feed
on:
  schedule:
    - cron: '10 22 * * *' # Beijing 06:10 daily
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python generate_calendar.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: update calendar feed
          file_pattern: calendar.ics
